services:
  # ── Backend Web Service ──────────────────────────────────────────
  - type: web
    name: golfforgood-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ── Frontend Static Site ─────────────────────────────────────────
  - type: static
    name: golfforgood-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    publishDir: ./dist
    envVars:
      # These are injected at BUILD TIME by Render — Vite bakes them in
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
    routes:
      # ── Static assets — serve directly, do NOT rewrite ────────────
      - type: rewrite
        source: /assets/*
        destination: /assets/:splat
      - type: rewrite
        source: /favicon.svg
        destination: /favicon.svg
      # ── SPA fallback — HTML navigation routes only ──────────────
      - type: rewrite
        source: /*
        destination: /index.html
