<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Hero image preload — prevents progressive rendering on auth pages -->
    <link rel="preload" as="image" href="/src/assets/golf.webp" type="image/webp" fetchpriority="high" />

    <!-- SEO -->
    <title>GolfForGood — Play. Give. Win.</title>
    <meta name="description" content="GolfForGood is a subscription platform combining golf score tracking, monthly prize draws, and charitable giving. Play golf, support charity, win real prizes." />
    <meta name="keywords" content="golf, charity, prize draw, subscription, score tracking, golfforgood" />
    <meta name="author" content="GolfForGood" />

    <!-- Open Graph -->
    <meta property="og:title" content="GolfForGood — Play. Give. Win." />
    <meta property="og:description" content="Golf meets generosity. Track scores, support charities, win monthly jackpots." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://golfforgood.com" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="GolfForGood — Play. Give. Win." />
    <meta name="twitter:description" content="Golf meets generosity. Track scores, support charities, win monthly jackpots." />

    <!-- Theme -->
    <meta name="theme-color" content="#0F766E" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
